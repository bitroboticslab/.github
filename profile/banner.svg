<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>
  <!-- Robot footstep dots -->
  <circle cx="60" cy="100" r="4" fill="#58a6ff" opacity="0.6"/>
  <circle cx="90" cy="85" r="3" fill="#58a6ff" opacity="0.4"/>
  <circle cx="120" cy="105" r="4" fill="#3fb950" opacity="0.6"/>
  <circle cx="150" cy="88" r="3" fill="#3fb950" opacity="0.4"/>
  <circle cx="180" cy="100" r="4" fill="#58a6ff" opacity="0.6"/>
  <!-- Title -->
  <text x="400" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#f0f6fc">BitRoboticsLab</text>
  <!-- Accent line -->
  <rect x="300" y="98" width="200" height="2" fill="url(#accent)" rx="1"/>
  <!-- Tagline -->
  <text x="400" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e">Open-source legged locomotion stack</text>
  <text x="400" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#6e7681">planning &amp; control · training &amp; deployment · hands-on tutorials</text>
</svg>
